<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>Assignment 1</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-sidebar@0.2.4/src/L.Control.Sidebar.css"
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script src="https://unpkg.com/leaflet-sidebar@0.2.4/src/L.Control.Sidebar.js"></script>
    <style>
      #map {
        height: 500px;
      }
      #side-bar {
        position: absolute;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.7);
        padding: 10px;
        right: 0;
        top: 0;
        margin: 10px;
        border-radius: 10px;
        min-height: 200px;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <div id="side-bar" class="col-md-3">
      <h2>My Map</h2>
      <button id="t1">Task 1</button>
      <button id="t2">Task 2</button>
      <button id="t3">Task 3</button>
      <button id="t4">Task 4</button>
      <button id="t5">Task 5</button>
    </div>

    <div id="sidebar"><h1>leaflet-sidebar</h1></div>

    <script>
      var map = L.map("map").setView(
        [60.60787315849288, 15.634815333406516],
        13,
      );

      var sidebar = L.control.sidebar("sidebar", { position: "left" });
      map.addControl(sidebar);

      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution:
          '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      }).addTo(map);

      document.getElementById("t1").addEventListener("click", function () {
        map.flyTo([60.608914763959696, 15.638057344726658], 15);
      });

      var marker = L.marker([60.60940802733496, 15.633297202624851]).addTo(map);
      marker.bindPopup(
        "<h3>Kristinegymnasiet</h3><img src='https://byggpartner.se/wp-content/uploads/2020/05/Kristinegymnasiet-ext-840x470-1.jpg' width='150px'>",
      );

      var latlngs = [
        [60.60396357441295, 15.641390822768553],
        [60.60420186814081, 15.641114555265649],
        [60.604717945763966, 15.640170417779986],
        [60.606081825509804, 15.638582550019283],
        [60.609399130229704, 15.634752355604736],
        [60.610847053215096, 15.633078656888829],
      ];

      var polyline = L.polyline(latlngs, { color: "red" }).addTo(map);
      polyline.bindPopup(
        "<h3>Vägbeskrivning</h3><p>Gå från Kristinegymnasiet till Falu lasarett</p>",
      );

      var polygon = L.polygon([
        [60.61029521664149, 15.643452045764388],
        [60.60876828813048, 15.64074837898038],
        [60.60760988037732, 15.643194553689717],
        [60.60913686369608, 15.64544760934306],
      ]).addTo(map);
      polygon.bindPopup("<h3>Falu lasarett</h3> ");

      document.getElementById("t2").addEventListener("click", function () {
        map.flyTo([64.75147094750132, 20.953463372608912], 13);
      });

      document.getElementById("t3").addEventListener("click", function () {});

      var nordana = L.marker([64.74898752885942, 20.940727029087714]).addTo(
        map,
      );

      var skelleftealasarett = L.marker([
        64.75581175672313, 20.943621132571465,
      ]).addTo(map);

      var sarakulturhus = L.marker([
        64.75243131945044, 20.954218540386652,
      ]).addTo(map);

      var anderstorpgymnasiet = L.marker([
        64.74116804530777, 20.969041644522484,
      ]).addTo(map);
      var marker6 = L.marker([64.750441, 20.953463]).addTo(map);

      skelleftealasarett.on("click", function () {
        sidebar.setContent(
          "<h3>Skellefteå lasarett</h3><p>Skellefteå lasarett är ett sjukhus i Skellefteå, Sverige. Det är en del av Västerbottens läns landsting och erbjuder vård inom flera olika specialiteter.</p><img src='https://www.vll.se/globalassets/om-vll/organisation/kliniker/lasarettet/skelleftea-lasarett/skelleftea-lasarett-1.jpg' width='200px'>",
        );
        sidebar.show();
      });

      anderstorpgymnasiet.on("click", function () {
        sidebar.setContent(
          "<h3>Anderstorpsgymnasiet</h3><p>Anderstorpsgymnasiet är en gymnasieskola i Skellefteå, Sverige. Skolan erbjuder utbildningar inom flera olika program, inklusive teknik, ekonomi, samhällsvetenskap och naturvetenskap.</p><img src='https://www.skelleftea.se/globalassets/om-skolan/anderstorpsgymnasiet/anderstorpsgymnasiet-1.jpg' width='200px'>",
        );
        sidebar.show();
      });
      sarakulturhus.on("click", function () {
        sidebar.setContent(
          "<h3>Sarakulturhus</h3><p>Sarakulturhus är en kulturinstitution i Skellefteå, Sverige. Det är en plats där olika kulturella evenemang och aktiviteter äger rum, inklusive konserter, teaterföreställningar, utställningar och workshops.</p><img src='https://www.skelleftea.se/globalassets/om-staden/skelleftea-kultur/sarakulturhus/sarakulturhus-1.jpg' width='200px'>",
        );
        sidebar.show();
      });
      nordana.on("click", function () {
        sidebar.setContent(
          "<h3>Nordana</h3><p>Nordana är en byggnad i Skellefteå, Sverige. Det är en modern kontorsbyggnad som rymmer flera företag och organisationer. Nordana är känd för sin unika arkitektur och sin centrala placering i staden.</p><img src='https://www.skelleftea.se/globalassets/om-staden/skelleftea-naringsliv/nordana/nordana-1.jpg' width='200px'>",
        );
        sidebar.show();
      });
    </script>
  </body>
</html>
